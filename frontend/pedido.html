<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Açaí Express</title>
    <style>
        :root {
            --primary: #4b1d8d;
            --secondary: #8e44ad; /* Cor Lilás */
            --accent: #27ae60;
            --bg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }

        /* HEADER */
        .header {
            background: var(--primary);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .cart-btn {
            background: #fff;
            color: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* GRID */
        .container { padding: 30px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* CARD COM MOLDURA LILÁS */
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            /* ADICIONADO: Moldura Lilás */
            border: 2px solid var(--secondary); 
            /* ADICIONADO: Leve fundo lilás */
            background-color: #fdfbff; 
        }

        .preco { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }

        .opcoes-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 20px;
            padding: 10px;
            background: #fff; /* Fundo branco dentro das opções */
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .opcao-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; }

        .btn-add-vitrine {
            width: 100%;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-finalizar {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            right: -100%;
            top: 0;
            width: 400px;
            max-width: 100%;
            height: 100%;
            background: white;
            box-shadow: -8px 0 20px rgba(0,0,0,0.2);
            transition: 0.4s;
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .sidebar-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }

        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .cart-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .qty-btn {
            background: white;
            border: 1px solid #ddd;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        .sidebar-footer { padding: 20px; border-top: 2px solid #eee; }

        @media (max-width: 450px) { .sidebar { width: 100%; } }
    </style>
</head>
<body>

<header class="header">
    <h1>Açaí Express</h1>
    <button class="cart-btn" onclick="toggleCart(true)">🛒 <span id="cart-count">0</span> Itens</button>
</header>

<div class="container">
    <div class="grid" id="produtos-grid"></div>
</div>

<div class="sidebar" id="cart-sidebar">
    <div class="sidebar-header">
        <h2>Meu Pedido</h2>
        <button onclick="toggleCart(false)" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="sidebar-footer">
        <div style="display:flex; justify-content:space-between; font-size:1.4rem; font-weight:bold; margin-bottom:15px;">
            <span>Total:</span>
            <span id="cart-total">R$ 0,00</span>
        </div>
        <button class="btn-finalizar" onclick="enviarPedido()">Enviar Pedido para Estabelecimento</button>
    </div>
</div>

<script>
    const produtos = [
        { id: 1, nome: "Copo 200ml Econômico", preco: 10.00 },
        { id: 2, nome: "Copo 300ml Tradicional", preco: 15.00 },
        { id: 3, nome: "Copo 400ml Médio", preco: 18.00 },
        { id: 4, nome: "Copo 500ml Grande", preco: 22.00 },
        { id: 5, nome: "Copo 700ml Gigante", preco: 28.00 },
        { id: 6, nome: "Tigela 500ml Casa", preco: 24.00 },
        { id: 7, nome: "Tigela 800ml Família", preco: 35.00 },
        { id: 8, nome: "Barca de Açaí P", preco: 45.00 },
        { id: 9, nome: "Barca de Açaí G", preco: 65.00 },
        { id: 10, nome: "Copo Trufado Nutella", preco: 26.00 },
        { id: 11, nome: "Copo Trufado Ninho", preco: 26.00 },
        { id: 12, nome: "Açaí Zero Açúcar 400ml", preco: 21.00 }
    ];

    const complementos = [
        "Leite em Pó", "Granola", "Banana", "Morango", "Nutella", "Paçoca", 
        "Leite Condensado", "M&Ms", "Coco Ralado", "Ovomaltine", "Bis", "Kiwi"
    ];

    let carrinho = [];

    function renderVitrine() {
        document.getElementById('produtos-grid').innerHTML = produtos.map(p => `
            <div class="card">
                <h3>${p.nome}</h3>
                <span class="preco">R$ ${p.preco.toFixed(2)}</span>
                <div class="opcoes-container">
                    ${complementos.map(comp => `<label class="opcao-item"><input type="checkbox" class="check-${p.id}" value="${comp}"> ${comp}</label>`).join('')}
                </div>
                <button class="btn-add-vitrine" onclick="addToCart(${p.id})">Adicionar</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const prod = produtos.find(p => p.id === id);
        const selected = Array.from(document.querySelectorAll(`.check-${id}:checked`)).map(c => c.value);
        const itemKey = prod.nome + ":" + selected.sort().join(',');

        const existente = carrinho.find(i => i.key === itemKey);
        if (existente) existente.qtd++;
        else carrinho.push({ key: itemKey, nome: prod.nome, preco: prod.preco, extras: selected, qtd: 1 });

        document.querySelectorAll(`.check-${id}`).forEach(c => c.checked = false);
        updateUI();
        toggleCart(true);
    }

    function changeQty(key, delta) {
        const index = carrinho.findIndex(i => i.key === key);
        if (index !== -1) {
            carrinho[index].qtd += delta;
            if (carrinho[index].qtd <= 0) carrinho.splice(index, 1);
        }
        updateUI();
    }

    function updateUI() {
        let total = 0, qtdT = 0;
        document.getElementById('cart-list').innerHTML = carrinho.map(item => {
            total += (item.preco * item.qtd);
            qtdT += item.qtd;
            return `
                <div class="cart-item">
                    <h4>${item.nome}</h4>
                    <p style="font-size:0.8rem; color:#666">${item.extras.join(', ') || 'Puro'}</p>
                    <div class="cart-controls">
                        <span style="font-weight:bold">R$ ${(item.preco * item.qtd).toFixed(2)}</span>
                        <div class="qty-box">
                            <button class="qty-btn" onclick="changeQty('${item.key}', -1)">-</button>
                            <span>${item.qtd}</span>
                            <button class="qty-btn" onclick="changeQty('${item.key}', 1)">+</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('cart-count').innerText = qtdT;
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
    }

    function toggleCart(s) { document.getElementById('cart-sidebar').classList.toggle('active', s); }

    function enviarPedido() {
        if (carrinho.length === 0) return;
        carrinho = [];
        updateUI();
        toggleCart(false);
    }

    renderVitrine();
</script>
</body>
</html>
